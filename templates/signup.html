<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LtrustRx Signup</title>

    <style>

        body {
            background-color: #0f172a;
            font-family: Arial, sans-serif;
            color: white;

            display: flex;
            justify-content: center;
            align-items: center;

            height: 100vh;
            margin: 0;
        }

        .signup-box {

            background-color: #1e293b;

            padding: 40px;

            border-radius: 20px;

            width: 350px;

            text-align: center;
        }

        h1 {
            color: #38bdf8;
        }

        input {

            width: 100%;

            padding: 12px;

            margin-top: 15px;

            border-radius: 10px;

            border: none;
        }

        button {

            width: 100%;

            padding: 12px;

            margin-top: 20px;

            background-color: #38bdf8;

            border: none;

            border-radius: 10px;

            font-size: 18px;

            font-weight: bold;

            cursor: pointer;
        }

        button:hover {
            background-color: #0ea5e9;
        }

        .error {
            color: red;
            margin-top: 15px;
        }

        a {
            color: #38bdf8;
        }

    </style>

</head>

<body>

<div class="signup-box">

    <h1>Create Account 🚀</h1>

    <form method="POST" action="/signup">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Signup
        </button>

    </form>

    <p>
        Already have an account?
        <a href="/login">Login</a>
    </p>

    {% if error %}

    <p class="error">{{ error }}</p>

    {% endif %}

</div>

</body>

</html>
