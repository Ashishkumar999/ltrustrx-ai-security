<!DOCTYPE html>

<html>

<head>

    <title>LtrustRx Admin</title>

    <style>

        body {

            margin: 0;

            padding: 30px;

            background: #020c2b;

            color: white;

            font-family: Arial;

        }


        h1 {

            color: #38bdf8;

            margin-bottom: 40px;

        }


        table {

            width: 100%;

            border-collapse: collapse;

            background: #132257;

        }


        th {

            background: #38bdf8;

            color: black;

            padding: 18px;

            border: 1px solid #1d4ed8;

        }


        td {

            padding: 16px;

            border: 1px solid #1d4ed8;

            text-align: center;

        }


        tr:hover {

            background: #1e3a8a;

        }

    </style>

</head>

<body>

    <h1>

        Admin Scan History Dashboard 🚀

    </h1>


    <table>

        <thead>

            <tr>

                <th>User</th>

                <th>Target</th>

                <th>Total</th>

                <th>High</th>

                <th>Medium</th>

                <th>Low</th>

                <th>Info</th>

                <th>Date</th>

            </tr>

        </thead>


        <tbody>

            {% for row in history %}

            <tr>

                <td>{{ row[0] }}</td>

                <td>{{ row[1] }}</td>

                <td>{{ row[2] }}</td>

                <td>{{ row[3] }}</td>

                <td>{{ row[4] }}</td>

                <td>{{ row[5] }}</td>

                <td>{{ row[6] }}</td>

                <td>{{ row[7] }}</td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</body>

</html>
