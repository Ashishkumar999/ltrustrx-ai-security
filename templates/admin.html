<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Admin Dashboard</title>

    <style>

        body {

            background: #081028;
            color: white;
            font-family: Arial;
            padding: 40px;
        }

        h1 {

            color: #38bdf8;
            margin-bottom: 30px;
        }

        table {

            width: 100%;
            border-collapse: collapse;
            background: #111c44;
        }

        th, td {

            padding: 15px;
            border: 1px solid #1e3a8a;
            text-align: center;
        }

        th {

            background: #38bdf8;
            color: black;
        }

        tr:hover {

            background: #1e293b;
        }

    </style>

</head>

<body>

    <h1>Admin Scan History Dashboard 🚀</h1>

    <table>

        <tr>

            <th>User</th>
            <th>Target</th>
            <th>Total</th>
            <th>High</th>
            <th>Medium</th>
            <th>Low</th>
            <th>Info</th>
            <th>Date</th>

        </tr>

        {% for scan in scans %}

        <tr>

            <td>{{ scan.username }}</td>
            <td>{{ scan.target }}</td>
            <td>{{ scan.total_issues }}</td>
            <td>{{ scan.high }}</td>
            <td>{{ scan.medium }}</td>
            <td>{{ scan.low }}</td>
            <td>{{ scan.info }}</td>
            <td>{{ scan.created_at }}</td>

        </tr>

        {% endfor %}

    </table>

</body>

</html>
